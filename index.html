*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at top left,#1a1e36 0,#090a0f 38%,#07080c 100%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;min-height:100vh;font-size:14px}button,input,select,textarea{font:inherit}button{cursor:pointer}a{color:inherit}.app{display:grid;grid-template-columns:280px minmax(0,1fr);min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;background:rgba(12,14,22,.88);border-right:1px solid rgba(255,255,255,.08);backdrop-filter:blur(20px);display:flex;flex-direction:column;z-index:20}.brand{padding:24px 22px 20px;border-bottom:1px solid rgba(255,255,255,.08)}.brand-title{font-size:34px;font-weight:900;letter-spacing:.18em;color:var(--gold);line-height:1}.brand-sub{font-size:13px;color:var(--text);font-weight:700;margin-top:8px}.brand-tag{font-size:12px;color:var(--muted);line-height:1.45;margin-top:6px}.nav{padding:14px 10px;overflow:auto;flex:1}.nav button{width:100%;display:flex;align-items:center;gap:10px;border:0;background:transparent;color:var(--muted);padding:10px 12px;border-radius:14px;margin:2px 0;text-align:left;transition:.18s;font-weight:650}.nav button:hover{background:rgba(255,255,255,.06);color:var(--text)}.nav button.active{background:linear-gradient(135deg,rgba(212,175,55,.18),rgba(96,165,250,.10));color:var(--gold);box-shadow:inset 0 0 0 1px rgba(212,175,55,.22)}.nav-ico{width:22px;text-align:center;font-size:16px}.nav-label{flex:1}.side-foot{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);color:var(--muted);font-size:12px;line-height:1.5}.main{min-width:0;padding:28px;max-width:1500px;width:100%;margin:0 auto}.page{display:none;animation:fade .25s ease}.page.active{display:block}@keyframes fade{from{opacity:.4;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:22px}.title h1{margin:0;font-size:32px;letter-spacing:-.04em}.title p{margin:6px 0 0;color:var(--muted);font-size:14px}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.grid{display:grid;gap:16px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.g5{grid-template-columns:repeat(5,minmax(0,1fr))}.card{background:linear-gradient(180deg,rgba(26,30,44,.94),rgba(16,18,27,.94));border:1px solid rgba(255,255,255,.09);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;min-width:0}.card.soft{box-shadow:none;background:rgba(255,255,255,.035)}.card.gold{border-color:rgba(212,175,55,.34)}.card.green{border-color:rgba(74,222,128,.25)}.card.blue{border-color:rgba(96,165,250,.25)}.card.pink{border-color:rgba(251,113,133,.25)}.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);font-weight:800}.kpi-value{font-size:27px;font-weight:900;margin-top:8px;letter-spacing:-.04em}.kpi-sub{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.4}.section-title{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:900;margin:0 0 14px}.field{display:grid;gap:5px}.field label{color:var(--muted);font-size:12px;font-weight:750}.form-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:12px}.form-row.three{grid-template-columns:repeat(3,minmax(0,1fr))}.form-row.four{grid-template-columns:repeat(4,minmax(0,1fr))}input,select,textarea{width:100%;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.10);border-radius:13px;color:var(--text);padding:11px 12px;outline:0;transition:.18s}textarea{min-height:86px;resize:vertical}select option{background:#161926;color:#fff}input:focus,select:focus,textarea:focus{border-color:rgba(212,175,55,.55);box-shadow:0 0 0 3px rgba(212,175,55,.10)}.btn{border:0;border-radius:14px;padding:10px 14px;font-weight:850;color:#101014;background:var(--gold);display:inline-flex;align-items:center;gap:8px;justify-content:center;min-height:40px;transition:.16s}.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}.btn:active{transform:translateY(0) scale(.98)}.btn.secondary{background:rgba(255,255,255,.065);color:var(--text);border:1px solid rgba(255,255,255,.10)}.btn.danger{background:rgba(248,113,113,.13);color:var(--red);border:1px solid rgba(248,113,113,.25)}.btn.good{background:rgba(74,222,128,.14);color:var(--green);border:1px solid rgba(74,222,128,.25)}.btn.blue{background:rgba(96,165,250,.14);color:var(--blue);border:1px solid rgba(96,165,250,.25)}.btn.small{padding:7px 10px;min-height:32px;border-radius:11px;font-size:12px}.btn.full{width:100%}.bar{height:12px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--teal));border-radius:999px;width:0%;transition:.35s}.list{display:grid;gap:10px}.item{background:rgba(255,255,255,.042);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px}.muted{color:var(--muted)}.dim{color:var(--dim)}.gold-text{color:var(--gold)}.green-text{color:var(--green)}.red-text{color:var(--red)}.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:850;padding:4px 9px;border-radius:999px;background:rgba(255,255,255,.07);color:var(--muted);white-space:nowrap}.pill.gold{background:rgba(212,175,55,.16);color:var(--gold)}.pill.green{background:rgba(74,222,128,.14);color:var(--green)}.pill.blue{background:rgba(96,165,250,.14);color:var(--blue)}.pill.pink{background:rgba(251,113,133,.14);color:var(--pink)}.pill.orange{background:rgba(251,146,60,.14);color:var(--orange)}.table-wrap{overflow:auto;border-radius:16px;border:1px solid rgba(255,255,255,.08)}table{width:100%;border-collapse:collapse;min-width:680px;background:rgba(255,255,255,.025)}th,td{padding:12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.07);vertical-align:middle}th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;background:rgba(255,255,255,.035)}tr:last-child td{border-bottom:0}.mini-actions{display:flex;gap:6px;flex-wrap:wrap}.banner{border:1px solid rgba(212,175,55,.38);background:linear-gradient(135deg,rgba(212,175,55,.16),rgba(96,165,250,.08));border-radius:20px;padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:12px}.banner h3{margin:0;font-size:16px}.banner p{margin:4px 0 0;color:var(--muted)}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.cal-head{font-size:11px;color:var(--muted);text-align:center;font-weight:900;text-transform:uppercase}.day{min-height:66px;border-radius:15px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);padding:8px;display:flex;flex-direction:column;justify-content:space-between;transition:.16s;user-select:none}.day.clickable:hover{border-color:rgba(212,175,55,.45);transform:translateY(-1px)}.day.done{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.30)}.day.today{box-shadow:inset 0 0 0 1px var(--gold)}.day .num{font-weight:850}.day .mark{font-size:12px;color:var(--green);font-weight:900}.week-grid{display:grid;grid-template-columns:150px repeat(7,1fr);gap:8px;align-items:center}.week-cell{min-height:42px;display:flex;align-items:center;justify-content:center;border-radius:13px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);font-weight:800}.week-cell.check{cursor:pointer}.week-cell.done{background:rgba(74,222,128,.14);border-color:rgba(74,222,128,.28);color:var(--green)}.stars{display:flex;gap:6px}.star{font-size:24px;cursor:pointer;color:#4d5163;transition:.1s}.star.on{color:var(--gold)}canvas{width:100%;max-width:100%;height:250px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:18px}.chart-small{height:220px}.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(8px)}.modal{width:100%;max-width:560px;max-height:90vh;overflow:auto;background:var(--panel);border:1px solid rgba(255,255,255,.12);border-radius:24px;box-shadow:var(--shadow);padding:20px}.modal h2{margin:0 0 16px;font-size:22px}.toast{position:fixed;right:20px;bottom:20px;background:#151926;border:1px solid rgba(74,222,128,.28);color:var(--text);border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);display:none;z-index:150}.mobile-top{display:none}.danger-zone{border-color:rgba(248,113,113,.26)}
@media(max-width:1080px){.app{grid-template-columns:1fr}.sidebar{position:fixed;left:0;right:0;bottom:0;top:auto;height:72px;flex-direction:row;border-right:0;border-top:1px solid rgba(255,255,255,.08)}.brand,.side-foot{display:none}.nav{display:flex;gap:4px;overflow:auto;padding:8px}.nav button{width:auto;min-width:74px;flex-direction:column;gap:2px;justify-content:center;font-size:10px;padding:7px 8px;margin:0}.nav-ico{font-size:16px}.main{padding:18px 14px 92px}.mobile-top{display:block;margin-bottom:14px}.mobile-top .brand-title{font-size:28px}.g4,.g5{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(2,minmax(0,1fr))}.form-row,.form-row.three,.form-row.four{grid-template-columns:1fr}.top{flex-direction:column}.actions{justify-content:flex-start}.week-grid{grid-template-columns:110px repeat(7,52px);overflow:auto}.calendar{gap:5px}.day{min-height:54px;padding:6px}}
@media(max-width:620px){.g2,.g3,.g4,.g5{grid-template-columns:1fr}.main{padding-left:10px;padding-right:10px}.title h1{font-size:26px}.card{padding:14px;border-radius:18px}.banner{flex-direction:column;align-items:flex-start}.kpi-value{font-size:24px}.table-wrap table{min-width:620px}.calendar{grid-template-columns:repeat(7,minmax(38px,1fr))}.day{min-height:46px;font-size:12px}.day .mark{font-size:10px}}
</style>

<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-title">AURA</div>

    </div>

  </aside>
  <main class="main">
    <div class="mobile-top"><div class="brand-title">AURA</div><div class="brand-tag">Your Personal Life OS</div></div>
    <section id="home" class="page active"></section>
    <section id="money" class="page"></section>
    <section id="budget" class="page"></section>
    <section id="travel" class="page"></section>
    <section id="tracker" class="page"></section>
    <section id="expenses" class="page"></section>
    <section id="wellness" class="page"></section>
    <section id="yoga" class="page"></section>
    <section id="water" class="page"></section>
    <section id="sleep" class="page"></section>
    <section id="mood" class="page"></section>
    <section id="journal" class="page"></section>
    <section id="linkedin" class="page"></section>
    <section id="skills" class="page"></section>
    <section id="courses" class="page"></section>
    <section id="goals" class="page"></section>
    <section id="habits" class="page"></section>
    <section id="review" class="page"></section>
    <section id="reminders" class="page"></section>
    <section id="analytics" class="page"></section>
    <section id="settings" class="page"></section>
  </main>
</div>
<div id="modalBg" class="modal-bg" onclick="if(event.target.id==='modalBg')closeModal()"><div class="modal"><h2 id="modalTitle"></h2><div id="modalBody"></div></div></div>
<div class="toast" id="toast">Saved</div>
<script>
'use strict';
const KEY='AURA_LIFE_OS_V1';
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const moods=[{v:'Great',emoji:'😁'},{v:'Good',emoji:'🙂'},{v:'Okay',emoji:'😐'},{v:'Tired',emoji:'😴'},{v:'Bad',emoji:'😔'}];
const expenseCategories=['Transport','Shopping','Food','Entertainment','Subscriptions','Other'];
const goalCategories=['Career','Finance','Travel','Health','Personal'];
const navItems=[
 ['home','🏠','Home'],['money','💰','Money Hub'],['budget','📊','Budget'],['travel','✈️','Travel'],['tracker','🤝','Money Tracker'],['expenses','🧾','Expenses'],['wellness','🌅','Wellness'],['yoga','🧘','Yoga'],['water','💧','Water'],['sleep','🌙','Sleep'],['mood','🙂','Mood'],['journal','📝','Journal'],['linkedin','💼','LinkedIn'],['skills','🧠','Skills'],['courses','🎓','Courses'],['goals','🎯','Goals'],['habits','✅','Habits'],['review','⭐','Review'],['reminders','🔔','Reminders'],['analytics','📈','Analytics'],['settings','⚙️','Settings']
];
const defaultState={
 salary:90000,
 budgetTargets:{gold:50000,emergency:12000,travel:8000,personal:10000,fun:10000},
 budgetProgress:{},
 priorities:[{id:1,text:'Review today’s money plan',done:false},{id:2,text:'Complete yoga and water goal',done:false},{id:3,text:'Spend 20 minutes on career growth',done:false}],
 travelGoals:[{id:101,trip:'Thailand',country:'Thailand',target:250000,targetDate:'2026-12-15',saved:0},{id:102,trip:'Bali',country:'Indonesia',target:300000,targetDate:'2027-03-01',saved:0},{id:103,trip:'Japan',country:'Japan',target:650000,targetDate:'2027-10-10',saved:0},{id:104,trip:'Malaysia',country:'Malaysia',target:180000,targetDate:'2026-09-20',saved:0}],
 moneyTracker:[],expenses:[],yoga:{},water:{},sleep:[],moods:[],journal:[],
 linkedin:{posts:[],ideas:['Share a lesson from work this week','Post one career growth insight','Write about a project challenge and solution']},
 skills:[{id:201,name:'Figma',startedDate:'2026-01-01',completedDate:'',status:'In Progress'},{id:202,name:'Power BI',startedDate:'2026-02-01',completedDate:'',status:'Planned'},{id:203,name:'SQL',startedDate:'2026-03-01',completedDate:'',status:'Planned'},{id:204,name:'Python',startedDate:'2026-04-01',completedDate:'',status:'Planned'},{id:205,name:'Business Analysis',startedDate:'2026-05-01',completedDate:'',status:'Planned'},{id:206,name:'UI/UX',startedDate:'2026-06-01',completedDate:'',status:'Planned'}],
 courses:[],goals:[],habits:{names:['Yoga','Drink Water','Read','LinkedIn Post'],marks:{}},reviews:[],
 reminders:[
  {id:301,title:'LinkedIn Post',type:'weekly',day:4,enabled:true},{id:302,title:'Gold Investment',type:'monthly-day',day:1,enabled:true},{id:303,title:'Monthly Review',type:'last-day',enabled:true},{id:304,title:'Monthly Skill Selection',type:'monthly-day',day:1,enabled:true}
 ],
 wellnessSchedule:[{id:401,time:'5:25 AM',task:'Wake Up'},{id:402,time:'5:30 AM',task:'Yoga'},{id:403,time:'6:00 AM',task:'Get Ready'},{id:404,time:'7:00 AM',task:'Leave Home'},{id:405,time:'8:00 AM',task:'Work Starts'}]
};
let S=load();let active='home';let edit={type:null,id:null};
function load(){try{const raw=localStorage.getItem(KEY);if(raw){return merge(defaultState,JSON.parse(raw));}}catch(e){}return clone(defaultState)}
function merge(base,patch){const out=clone(base);for(const k in patch){if(patch[k]&&typeof patch[k]==='object'&&!Array.isArray(patch[k])&&base[k]&&typeof base[k]==='object'&&!Array.isArray(base[k])) out[k]=merge(base[k],patch[k]); else out[k]=patch[k];}return out}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
function clone(v){return JSON.parse(JSON.stringify(v));}
function id(){return Date.now()+Math.floor(Math.random()*1000)}
function today(){return new Date().toISOString().slice(0,10)}
function ym(d=today()){return d.slice(0,7)}
function fmt(n){return 'Rs. '+Number(n||0).toLocaleString('en-LK',{maximumFractionDigits:0})}
function pct(v,t){return t>0?Math.min(100,Math.max(0,Math.round((v/t)*100))):0}
function esc(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function toast(msg='Saved'){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1700)}
function setPage(p){active=p;document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(p).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===p));renderPage(p)}
function pageTop(title,sub,btn=''){return `<div class="top"><div class="title"><h1>${title}</h1><p>${sub}</p></div><div class="actions">${btn}</div></div>`}
function renderNav(){document.getElementById('nav').innerHTML=navItems.map(([p,i,l])=>`<button class="${p===active?'active':''}" data-page="${p}" onclick="setPage('${p}')"><span class="nav-ico">${i}</span><span class="nav-label">${l}</span></button>`).join('')}
function tick(){const d=new Date();document.getElementById('sideClock').textContent=d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});document.getElementById('sideDate').textContent=d.toLocaleDateString('en',{weekday:'long',day:'numeric',month:'long',year:'numeric'});const e=document.getElementById('homeClock');if(e)e.textContent=d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'});const f=document.getElementById('homeDate');if(f)f.textContent=d.toLocaleDateString('en',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}setInterval(tick,1000);
function dueReminders(date=today()){const d=new Date(date+'T12:00:00');const day=d.getDay();const monthLast=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();return S.reminders.filter(r=>r.enabled).filter(r=>{if(r.type==='weekly')return Number(r.day)===day;if(r.type==='monthly-day')return Number(r.day)===d.getDate();if(r.type==='last-day')return d.getDate()===monthLast;if(r.type==='once')return r.date===date;return false;});}
function isThursday(){return new Date().getDay()===4}
function monthName(m){return new Date(m+'-01T12:00:00').toLocaleString('en',{month:'long',year:'numeric'})}
function getMonthDays(m=ym()){const [y,mo]=m.split('-').map(Number);return new Date(y,mo,0).getDate()}
function daysBetween(date){const a=new Date(today()+'T00:00:00');const b=new Date(date+'T00:00:00');return Math.ceil((b-a)/86400000)}
function categoryLabel(k){return ({gold:'Gold Investment',emergency:'Emergency Fund',travel:'Travel Fund',personal:'Personal',fun:'Fun'})[k]||k}
function categoryColor(k){return ({gold:'gold',emergency:'green',travel:'blue',personal:'pink',fun:'orange'})[k]||'gold'}
function budgetSaved(cat){return Object.values(S.budgetProgress||{}).reduce((sum,m)=>sum+(m[cat]?.done?Number(m[cat].amount||0):0),0)}
function budgetSavedMonth(cat,m=ym()){return S.budgetProgress[m]?.[cat]?.done?Number(S.budgetProgress[m][cat].amount||0):0}
function travelSaved(){return S.travelGoals.reduce((s,g)=>s+Number(g.saved||0),0)}
function linkedInStreak(){const dates=[...new Set(S.linkedin.posts.map(p=>p.date))].sort().reverse();if(!dates.length)return 0;let count=0;let cursor=new Date(today()+'T12:00:00');for(let i=0;i<52;i++){const weekStart=new Date(cursor);weekStart.setDate(cursor.getDate()-cursor.getDay());const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);const has=dates.some(d=>{const x=new Date(d+'T12:00:00');return x>=weekStart&&x<=weekEnd});if(has){count++;cursor.setDate(cursor.getDate()-7)}else break;}return count}
function yogaStats(m=ym()){const days=getMonthDays(m);let done=0;for(let i=1;i<=days;i++){const d=`${m}-${String(i).padStart(2,'0')}`;if(S.yoga[d])done++;}let cur=0,long=0,tmp=0;for(let i=0;i<420;i++){const d=new Date();d.setDate(d.getDate()-i);const key=d.toISOString().slice(0,10);if(S.yoga[key]){if(i===cur)cur++;tmp++;long=Math.max(long,tmp)}else{tmp=0;if(i===0)cur=0}}return {done,days,current:cur,longest:long,percent:pct(done,days)}}
function monthlyProgress(){const cats=['gold','emergency','travel','personal','fun'];const b=cats.filter(c=>S.budgetProgress[ym()]?.[c]?.done).length/cats.length*40;const y=yogaStats().percent*.25;const w=(Number(S.water[today()]||0)>=2000?15:0);const l=(S.linkedin.posts.some(p=>p.date.slice(0,7)===ym())?10:0);const j=(S.journal.some(j=>j.date===today())?10:0);return Math.round(b+y+w+l+j)}
function renderPage(p=active){({home:renderHome,money:renderMoney,budget:renderBudget,travel:renderTravel,tracker:renderTracker,expenses:renderExpenses,wellness:renderWellness,yoga:renderYoga,water:renderWater,sleep:renderSleep,mood:renderMood,journal:renderJournal,linkedin:renderLinkedIn,skills:renderSkills,courses:renderCourses,goals:renderGoals,habits:renderHabits,review:renderReview,reminders:renderReminders,analytics:renderAnalytics,settings:renderSettings}[p]||renderHome)();tick();}
function refresh(){renderPage(active);save();}
function card(label,value,sub='',cls=''){return `<div class="card ${cls}"><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div>${sub?`<div class="kpi-sub">${sub}</div>`:''}</div>`}
function priorityToggle(pid){const p=S.priorities.find(x=>x.id==pid);if(p){p.done=!p.done;refresh()}}
function addPriority(){const v=document.getElementById('priorityInput').value.trim();if(!v)return;S.priorities.push({id:id(),text:v,done:false});refresh();toast('Priority added')}
function delPriority(pid){S.priorities=S.priorities.filter(x=>x.id!=pid);refresh()}
function renderHome(){const yoga=yogaStats();const rem=dueReminders();const thursday=isThursday()?`<div class="banner"><div><h3>💼 Thursday LinkedIn Reminder</h3><p>Today is your LinkedIn growth day. Post one insight, lesson, or career update.</p></div><button class="btn" onclick="setPage('linkedin')">Open LinkedIn</button></div>`:'';document.getElementById('home').innerHTML=pageTop('Home','Your day, money, health, growth and reminders in one command center')+thursday+`<div class="grid g4">${card('Current Date','<span id="homeDate"></span>','Sri Lanka local date','blue')}${card('Current Time','<span id="homeClock"></span>','Live clock','gold')}${card('Monthly Progress',monthlyProgress()+'%','Money + wellness + growth','green')}${card('Available Money',fmt(S.salary-S.budgetTargets.gold),'After Gold Investment','pink')}</div><div class="grid g4" style="margin-top:16px">${card('Gold Saved',fmt(budgetSaved('gold')),'Yearly progress','gold')}${card('Emergency Fund',fmt(budgetSaved('emergency')),'Saved through budget','green')}${card('Travel Fund',fmt(travelSaved()),'Across travel goals','blue')}${card('LinkedIn Streak',linkedInStreak()+' weeks','Weekly posting streak','')}${card('Yoga Streak',yoga.current+' days','Longest: '+yoga.longest+' days','green')}${card('Skills Learned',S.skills.filter(s=>s.completedDate||s.status==='Completed').length,'Completed skills','')}${card('Monthly Yoga',yoga.percent+'%','This month completion','')}${card('Today Water',Number(S.water[today()]||0)+' ml','Daily goal: 2L','blue')}</div><div class="grid g2" style="margin-top:16px"><div class="card"><div class="section-title">Today\'s Priorities</div><div class="list">${S.priorities.map(p=>`<div class="item row"><label style="display:flex;gap:10px;align-items:center;flex:1"><input type="checkbox" ${p.done?'checked':''} onchange="priorityToggle(${p.id})" style="width:auto"><span style="${p.done?'text-decoration:line-through;color:var(--dim)':''}">${esc(p.text)}</span></label><button class="btn danger small" onclick="delPriority(${p.id})">Delete</button></div>`).join('')||'<div class="muted">No priorities yet.</div>'}</div><div class="form-row" style="grid-template-columns:1fr auto;margin-top:12px;margin-bottom:0"><input id="priorityInput" placeholder="Add today\'s priority"><button class="btn" onclick="addPriority()">Add</button></div></div><div class="card"><div class="section-title">Today\'s Reminders</div><div class="list">${rem.length?rem.map(r=>`<div class="item row"><div><b>${esc(r.title)}</b><div class="muted">${reminderText(r)}</div></div><span class="pill gold">Due today</span></div>`).join(''):'<div class="item muted">No reminders due today. You are clear.</div>'}</div><button class="btn secondary full" style="margin-top:12px" onclick="setPage('reminders')">Manage Reminders</button></div></div>`;tick();}
function renderMoney(){const available=S.salary-S.budgetTargets.gold;document.getElementById('money').innerHTML=pageTop('Money Hub','Salary, Gold Investment, savings rate and available money')+`<div class="grid g4">${card('Salary',fmt(S.salary),'Monthly salary','blue')}${card('Gold Investment',fmt(S.budgetTargets.gold),'Target monthly investment','gold')}${card('Remaining Money',fmt(available),'Rs. 40,000 available by default','green')}${card('Savings Rate',pct(S.budgetTargets.gold,S.salary)+'%','Gold / salary','')}</div><div class="grid g2" style="margin-top:16px"><div class="card gold"><div class="section-title">Monthly Money Plan</div><div class="list"><div class="item row"><span>Gold Investment</span><b class="gold-text">${fmt(S.budgetTargets.gold)}</b></div><div class="item row"><span>Available Money</span><b class="green-text">${fmt(available)}</b></div><div class="item row"><span>Emergency Fund</span><b>${fmt(S.budgetTargets.emergency)}</b></div><div class="item row"><span>Travel Fund</span><b>${fmt(S.budgetTargets.travel)}</b></div><div class="item row"><span>Personal</span><b>${fmt(S.budgetTargets.personal)}</b></div><div class="item row"><span>Fun</span><b>${fmt(S.budgetTargets.fun)}</b></div></div></div><div class="card"><div class="section-title">Edit Money Settings</div><div class="form-row"><div class="field"><label>Salary</label><input type="number" id="salaryInput" value="${S.salary}"></div><div class="field"><label>Gold Investment</label><input type="number" id="goldInput" value="${S.budgetTargets.gold}"></div></div><div class="form-row three"><div class="field"><label>Emergency Fund</label><input type="number" id="emergencyInput" value="${S.budgetTargets.emergency}"></div><div class="field"><label>Travel Fund</label><input type="number" id="travelInput" value="${S.budgetTargets.travel}"></div><div class="field"><label>Personal</label><input type="number" id="personalInput" value="${S.budgetTargets.personal}"></div></div><div class="form-row" style="grid-template-columns:1fr auto"><div class="field"><label>Fun</label><input type="number" id="funInput" value="${S.budgetTargets.fun}"></div><button class="btn" onclick="saveMoneySettings()">Save Settings</button></div></div></div><div class="grid g2" style="margin-top:16px"><div class="card"><div class="section-title">Interactive Budget Pie Chart</div><canvas id="moneyPie" class="chart-small"></canvas></div><div class="card"><div class="section-title">Budget Percentages</div>${budgetPercentRows()}</div></div>`;setTimeout(()=>drawPie('moneyPie',budgetPieData()),0)}
function budgetPieData(){return [['Gold',S.budgetTargets.gold,'#d4af37'],['Emergency',S.budgetTargets.emergency,'#4ade80'],['Travel',S.budgetTargets.travel,'#60a5fa'],['Personal',S.budgetTargets.personal,'#fb7185'],['Fun',S.budgetTargets.fun,'#fb923c']]}
function budgetPercentRows(){const available=S.salary-S.budgetTargets.gold;return `<div class="list"><div class="item row"><span>Gold Investment</span><b>${pct(S.budgetTargets.gold,S.salary).toFixed(0)==='56'?'55.6':(S.budgetTargets.gold/S.salary*100).toFixed(1)}% • ${fmt(S.budgetTargets.gold)}</b></div><div class="item row"><span>Emergency Fund</span><b>30% • ${fmt(S.budgetTargets.emergency)}</b></div><div class="item row"><span>Travel Fund</span><b>20% • ${fmt(S.budgetTargets.travel)}</b></div><div class="item row"><span>Personal</span><b>25% • ${fmt(S.budgetTargets.personal)}</b></div><div class="item row"><span>Fun</span><b>25% • ${fmt(S.budgetTargets.fun)}</b></div></div>`}
function saveMoneySettings(){S.salary=Number(document.getElementById('salaryInput').value||0);['gold','emergency','travel','personal','fun'].forEach(k=>S.budgetTargets[k]=Number(document.getElementById(k+'Input').value||0));refresh();toast('Money settings saved')}
function renderBudget(){const y=Number(document.getElementById('budgetYear')?.value||new Date().getFullYear());const m=document.getElementById('budgetMonth')?.value||ym();const cats=['gold','emergency','travel','personal','fun'];document.getElementById('budget').innerHTML=pageTop('Budget System','Monthly tick boxes, yearly progress and category saving records')+`<div class="grid g3"><div class="card"><div class="field"><label>Budget Month</label><input type="month" id="budgetMonth" value="${m}" onchange="renderBudget()"></div></div><div class="card"><div class="field"><label>Year</label><input type="number" id="budgetYear" value="${y}" onchange="renderBudget()"></div></div><div class="card"><div class="kpi-label">Yearly Completion</div><div class="kpi-value">${yearBudgetPercent(y)}%</div><div class="bar"><div class="fill" style="width:${yearBudgetPercent(y)}%"></div></div></div></div><div class="grid g5" style="margin-top:16px">${cats.map(c=>budgetCategoryCard(c,m,y)).join('')}</div><div class="card" style="margin-top:16px"><div class="section-title">${y} Monthly Tick Board</div><div class="table-wrap"><table><thead><tr><th>Category</th>${months.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${cats.map(c=>`<tr><td><b>${categoryLabel(c)}</b><br><span class="muted">${fmt(S.budgetTargets[c])}</span></td>${months.map((mo,i)=>{const key=`${y}-${String(i+1).padStart(2,'0')}`;const done=S.budgetProgress[key]?.[c]?.done;return `<td><button class="btn ${done?'good':'secondary'} small" onclick="toggleBudget('${c}','${key}')">${mo} ${done?'✓':''}</button></td>`}).join('')}</tr>`).join('')}</tbody></table></div></div>`;}
function yearBudgetPercent(y){let total=0,done=0;['gold','emergency','travel','personal','fun'].forEach(c=>months.forEach((m,i)=>{total++;if(S.budgetProgress[`${y}-${String(i+1).padStart(2,'0')}`]?.[c]?.done)done++;}));return pct(done,total)}
function budgetCategoryCard(c,m,y){const saved=budgetSaved(c);const monthDone=S.budgetProgress[m]?.[c]?.done;return `<div class="card ${categoryColor(c)}"><div class="section-title">${categoryLabel(c)}</div><div class="kpi-value">${c==='gold'?'55.6%':c==='emergency'?'30%':c==='travel'?'20%':'25%'}</div><div class="kpi-sub">Monthly target: ${fmt(S.budgetTargets[c])}</div><div class="bar" style="margin:12px 0"><div class="fill" style="width:${monthDone?100:0}%"></div></div><div class="field"><label>Save Amount for ${monthName(m)}</label><input type="number" id="budgetAmt_${c}" value="${S.budgetProgress[m]?.[c]?.amount||S.budgetTargets[c]}"></div><button class="btn full" style="margin-top:10px" onclick="saveBudgetCategory('${c}','${m}')">Save ${categoryLabel(c)}</button><button class="btn ${monthDone?'good':'secondary'} full" style="margin-top:8px" onclick="toggleBudget('${c}','${m}')">${m.split('-')[1]} ${monthDone?'✓ Saved':'Mark Saved'}</button><div class="kpi-sub">Year saved: ${fmt(saved)}</div></div>`}
function saveBudgetCategory(c,m){if(!S.budgetProgress[m])S.budgetProgress[m]={};S.budgetProgress[m][c]={done:true,amount:Number(document.getElementById('budgetAmt_'+c).value||S.budgetTargets[c]),date:today()};refresh();toast(categoryLabel(c)+' saved')}
function toggleBudget(c,m){if(!S.budgetProgress[m])S.budgetProgress[m]={};const cur=S.budgetProgress[m][c];S.budgetProgress[m][c]={done:!(cur&&cur.done),amount:cur?.amount||S.budgetTargets[c],date:today()};refresh();}
function renderTravel(){document.getElementById('travel').innerHTML=pageTop('Travel Fund','Create travel goals, track saved amount, remaining amount and countdown')+`<div class="card"><div class="section-title">${edit.type==='travel'?'Edit Travel Goal':'Add Travel Goal'}</div><div class="form-row four"><div class="field"><label>Trip Name</label><input id="tripName" value="${edit.type==='travel'?esc(getById(S.travelGoals,edit.id)?.trip):''}"></div><div class="field"><label>Country</label><input id="tripCountry" value="${edit.type==='travel'?esc(getById(S.travelGoals,edit.id)?.country):''}"></div><div class="field"><label>Target Amount</label><input type="number" id="tripTarget" value="${edit.type==='travel'?getById(S.travelGoals,edit.id)?.target||'':''}"></div><div class="field"><label>Target Date</label><input type="date" id="tripDate" value="${edit.type==='travel'?getById(S.travelGoals,edit.id)?.targetDate||'':''}"></div></div><button class="btn" onclick="saveTravelGoal()">${edit.type==='travel'?'Update Goal':'Add Goal'}</button>${edit.type==='travel'?`<button class="btn secondary" onclick="edit={type:null,id:null};renderTravel()">Cancel</button>`:''}</div><div class="grid g4" style="margin-top:16px">${S.travelGoals.map(g=>travelCard(g)).join('')}</div>`}
function travelCard(g){const p=pct(g.saved,g.target);const left=Math.max(0,g.target-g.saved);const days=daysBetween(g.targetDate);return `<div class="card blue"><div class="row"><div><div class="section-title" style="margin-bottom:4px">${esc(g.trip)}</div><h2 style="margin:0">${esc(g.country)}</h2></div><span class="pill blue">${days>=0?days+' days':'Passed'}</span></div><div class="bar" style="margin:14px 0"><div class="fill" style="width:${p}%"></div></div><div class="row"><span>Saved</span><b>${fmt(g.saved)}</b></div><div class="row"><span>Remaining</span><b>${fmt(left)}</b></div><div class="row"><span>Target</span><b>${fmt(g.target)}</b></div><div class="form-row" style="grid-template-columns:1fr auto;margin-top:12px;margin-bottom:0"><input type="number" id="travelAdd_${g.id}" placeholder="Amount"><button class="btn small" onclick="addTravelSaving(${g.id})">+ Save</button></div><div class="mini-actions" style="margin-top:10px"><button class="btn secondary small" onclick="edit={type:'travel',id:${g.id}};renderTravel()">Edit</button><button class="btn danger small" onclick="deleteTravel(${g.id})">Delete</button></div></div>`}
function getById(arr,i){return arr.find(x=>x.id==i)||{}}
function saveTravelGoal(){const obj={trip:val('tripName'),country:val('tripCountry'),target:Number(val('tripTarget')),targetDate:val('tripDate')};if(!obj.trip||!obj.country||!obj.target||!obj.targetDate){alert('Fill all travel goal fields');return}if(edit.type==='travel'){Object.assign(getById(S.travelGoals,edit.id),obj);edit={type:null,id:null}}else{S.travelGoals.push({...obj,id:id(),saved:0})}refresh();toast('Travel goal saved')}
function addTravelSaving(i){const g=getById(S.travelGoals,i);const a=Number(val('travelAdd_'+i));if(a>0){g.saved=Number(g.saved||0)+a;refresh();toast('Travel saving added')}}
function deleteTravel(i){if(confirm('Delete this travel goal?')){S.travelGoals=S.travelGoals.filter(x=>x.id!=i);refresh()}}
function renderTracker(){document.getElementById('tracker').innerHTML=pageTop('Money Tracker','Track money given, borrowed, received and completed')+`<div class="grid g4">${card('Total Receivable',fmt(totalReceivable()),'Given money still pending','green')}${card('Total Owed',fmt(totalOwed()),'Borrowed money still pending','pink')}${card('Pending Records',S.moneyTracker.filter(x=>x.status==='Pending').length,'Need attention','')}${card('Completed Records',S.moneyTracker.filter(x=>x.status!=='Pending').length,'Received / completed','')}</div><div class="card" style="margin-top:16px"><div class="section-title">${edit.type==='money'?'Edit Money Record':'Add Money Record'}</div><div class="form-row four"><div class="field"><label>Person Name</label><input id="mtPerson" value="${edit.type==='money'?esc(getById(S.moneyTracker,edit.id).person):''}"></div><div class="field"><label>Amount</label><input type="number" id="mtAmount" value="${edit.type==='money'?getById(S.moneyTracker,edit.id).amount||'':''}"></div><div class="field"><label>Given / Borrowed</label><select id="mtType"><option ${sel(edit.type==='money'&&getById(S.moneyTracker,edit.id).type==='Given')}>Given</option><option ${sel(edit.type==='money'&&getById(S.moneyTracker,edit.id).type==='Borrowed')}>Borrowed</option></select></div><div class="field"><label>Date</label><input type="date" id="mtDate" value="${edit.type==='money'?getById(S.moneyTracker,edit.id).date||today():today()}"></div></div><div class="form-row" style="grid-template-columns:1fr auto"><div class="field"><label>Status</label><select id="mtStatus"><option ${sel(edit.type==='money'&&getById(S.moneyTracker,edit.id).status==='Pending')}>Pending</option><option ${sel(edit.type==='money'&&getById(S.moneyTracker,edit.id).status==='Received')}>Received</option><option ${sel(edit.type==='money'&&getById(S.moneyTracker,edit.id).status==='Completed')}>Completed</option></select></div><button class="btn" onclick="saveMoneyTrack()">${edit.type==='money'?'Update':'Add'} Record</button></div></div>${tableMoneyTracker()}`}
function sel(x){return x?'selected':''}
function totalReceivable(){return S.moneyTracker.filter(x=>x.type==='Given'&&x.status==='Pending').reduce((s,x)=>s+Number(x.amount||0),0)}
function totalOwed(){return S.moneyTracker.filter(x=>x.type==='Borrowed'&&x.status==='Pending').reduce((s,x)=>s+Number(x.amount||0),0)}
function saveMoneyTrack(){const o={person:val('mtPerson'),amount:Number(val('mtAmount')),type:val('mtType'),date:val('mtDate'),status:val('mtStatus')};if(!o.person||!o.amount||!o.date){alert('Fill person, amount and date');return}if(edit.type==='money'){Object.assign(getById(S.moneyTracker,edit.id),o);edit={type:null,id:null}}else S.moneyTracker.push({...o,id:id()});refresh();toast('Money tracker saved')}
function tableMoneyTracker(){return `<div class="card" style="margin-top:16px"><div class="section-title">Money History</div><div class="table-wrap"><table><thead><tr><th>Person</th><th>Amount</th><th>Type</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>${S.moneyTracker.map(x=>`<tr><td><b>${esc(x.person)}</b></td><td>${fmt(x.amount)}</td><td><span class="pill ${x.type==='Given'?'green':'pink'}">${x.type}</span></td><td>${x.date}</td><td>${x.status}</td><td><div class="mini-actions"><button class="btn secondary small" onclick="edit={type:'money',id:${x.id}};renderTracker()">Edit</button><button class="btn danger small" onclick="delFrom('moneyTracker',${x.id})">Delete</button></div></td></tr>`).join('')||'<tr><td colspan="6" class="muted">No records yet.</td></tr>'}</tbody></table></div></div>`}
function renderExpenses(){document.getElementById('expenses').innerHTML=pageTop('Expense Tracker','Add, edit, delete and analyze monthly expenses')+`<div class="grid g4">${card('This Month',fmt(monthExpenses()),'All categories','pink')}${card('Transport',fmt(catExpense('Transport')),'This month','')}${card('Food',fmt(catExpense('Food')),'This month','')}${card('Subscriptions',fmt(catExpense('Subscriptions')),'This month','')}</div><div class="grid g2" style="margin-top:16px"><div class="card"><div class="section-title">${edit.type==='expense'?'Edit Expense':'Add Expense'}</div><div class="form-row"><div class="field"><label>Category</label><select id="expCat">${expenseCategories.map(c=>`<option ${sel(edit.type==='expense'&&getById(S.expenses,edit.id).category===c)}>${c}</option>`).join('')}</select></div><div class="field"><label>Amount</label><input type="number" id="expAmount" value="${edit.type==='expense'?getById(S.expenses,edit.id).amount||'':''}"></div></div><div class="form-row"><div class="field"><label>Date</label><input type="date" id="expDate" value="${edit.type==='expense'?getById(S.expenses,edit.id).date||today():today()}"></div><div class="field"><label>Note</label><input id="expNote" value="${edit.type==='expense'?esc(getById(S.expenses,edit.id).note):''}"></div></div><button class="btn" onclick="saveExpense()">${edit.type==='expense'?'Update Expense':'Add Expense'}</button>${edit.type==='expense'?`<button class="btn secondary" onclick="edit={type:null,id:null};renderExpenses()">Cancel</button>`:''}</div><div class="card"><div class="section-title">Monthly Expense Pie Chart</div><canvas id="expensePie" class="chart-small"></canvas></div></div>${expenseTable()}`;setTimeout(()=>drawPie('expensePie',expensePieData()),0)}
function monthExpenses(){return S.expenses.filter(e=>e.date&&e.date.slice(0,7)===ym()).reduce((s,e)=>s+Number(e.amount||0),0)}
function catExpense(c){return S.expenses.filter(e=>e.category===c&&e.date.slice(0,7)===ym()).reduce((s,e)=>s+Number(e.amount||0),0)}
function saveExpense(){const o={category:val('expCat'),amount:Number(val('expAmount')),date:val('expDate'),note:val('expNote')};if(!o.amount||!o.date){alert('Fill amount and date');return}if(edit.type==='expense'){Object.assign(getById(S.expenses,edit.id),o);edit={type:null,id:null}}else S.expenses.push({...o,id:id()});refresh();toast('Expense saved')}
function expenseTable(){return `<div class="card" style="margin-top:16px"><div class="section-title">Expense History</div><div class="table-wrap"><table><thead><tr><th>Date</th><th>Category</th><th>Note</th><th>Amount</th><th>Actions</th></tr></thead><tbody>${[...S.expenses].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`<tr><td>${e.date}</td><td><span class="pill pink">${e.category}</span></td><td>${esc(e.note)}</td><td class="red-text">${fmt(e.amount)}</td><td><div class="mini-actions"><button class="btn secondary small" onclick="edit={type:'expense',id:${e.id}};renderExpenses()">Edit</button><button class="btn danger small" onclick="delFrom('expenses',${e.id})">Delete</button></div></td></tr>`).join('')||'<tr><td colspan="5" class="muted">No expenses yet.</td></tr>'}</tbody></table></div></div>`}
function expensePieData(){return expenseCategories.map((c,i)=>[c,catExpense(c),['#60a5fa','#fb7185','#4ade80','#a78bfa','#d4af37','#fb923c'][i]])}
function renderWellness(){document.getElementById('wellness').innerHTML=pageTop('Wellness System','Monday-Friday morning schedule designed for consistency')+`<div class="grid g2"><div class="card green"><div class="section-title">Morning Schedule • Monday-Friday</div><div class="list">${S.wellnessSchedule.map(x=>`<div class="item row"><div><span class="pill green">${esc(x.time)}</span> <b>${esc(x.task)}</b></div><div class="mini-actions"><button class="btn secondary small" onclick="edit={type:'schedule',id:${x.id}};renderWellness()">Edit</button><button class="btn danger small" onclick="delFrom('wellnessSchedule',${x.id})">Delete</button></div></div>`).join('')}</div></div><div class="card"><div class="section-title">${edit.type==='schedule'?'Edit Schedule Item':'Add Schedule Item'}</div><div class="form-row"><div class="field"><label>Time</label><input id="schTime" value="${edit.type==='schedule'?esc(getById(S.wellnessSchedule,edit.id).time):''}"></div><div class="field"><label>Task</label><input id="schTask" value="${edit.type==='schedule'?esc(getById(S.wellnessSchedule,edit.id).task):''}"></div></div><button class="btn" onclick="saveSchedule()">${edit.type==='schedule'?'Update':'Add'} Schedule</button></div></div>`}
function saveSchedule(){const o={time:val('schTime'),task:val('schTask')};if(!o.time||!o.task){alert('Fill time and task');return}if(edit.type==='schedule'){Object.assign(getById(S.wellnessSchedule,edit.id),o);edit={type:null,id:null}}else S.wellnessSchedule.push({...o,id:id()});refresh();toast('Schedule saved')}
function renderYoga(){const m=document.getElementById('yogaMonth')?.value||ym();const st=yogaStats(m);document.getElementById('yoga').innerHTML=pageTop('Yoga Tracker','Tap any day to mark yoga completed')+`<div class="grid g4">${card('Current Streak',st.current+' days','Keep going','green')}${card('Longest Streak',st.longest+' days','Personal best','gold')}${card('Monthly Completion',st.percent+'%',`${st.done}/${st.days} days`,'blue')}${card('Weekly Progress',weeklyYogaDone()+'/7','This week','')}</div><div class="card" style="margin-top:16px"><div class="row"><div class="section-title">Daily Calendar</div><input type="month" id="yogaMonth" value="${m}" onchange="renderYoga()" style="max-width:180px"></div>${calendarHTML(m,'yoga')}</div>`}
function calendarHTML(m,type){const [y,mo]=m.split('-').map(Number);const first=new Date(y,mo-1,1).getDay();const days=getMonthDays(m);let h='<div class="calendar">'+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-head">${d}</div>`).join('');for(let i=0;i<first;i++)h+='<div></div>';for(let d=1;d<=days;d++){const key=`${m}-${String(d).padStart(2,'0')}`;const done=type==='yoga'?S.yoga[key]:false;h+=`<div class="day clickable ${done?'done':''} ${key===today()?'today':''}" onclick="toggleYoga('${key}')"><div class="num">${d}</div><div class="mark">${done?'✓ Yoga':''}</div></div>`}return h+'</div>'}
function toggleYoga(d){S.yoga[d]=!S.yoga[d];if(!S.yoga[d])delete S.yoga[d];refresh()}
function weeklyYogaDone(){const s=weekDates().filter(d=>S.yoga[d]).length;return s}
function renderWater(){const d=document.getElementById('waterDate')?.value||today();const ml=Number(S.water[d]||0);document.getElementById('water').innerHTML=pageTop('Water Tracker','Daily 2L goal with quick add buttons')+`<div class="grid g3"><div class="card blue"><div class="field"><label>Date</label><input type="date" id="waterDate" value="${d}" onchange="renderWater()"></div></div>${card('Water Today',ml+' ml','Goal: 2,000 ml','blue')}${card('Progress',pct(ml,2000)+'%','Daily hydration','green')}</div><div class="card" style="margin-top:16px"><div class="section-title">2L Daily Goal</div><div class="bar"><div class="fill" style="width:${pct(ml,2000)}%"></div></div><div class="actions" style="justify-content:flex-start;margin-top:16px"><button class="btn blue" onclick="addWater('${d}',250)">+250ml</button><button class="btn blue" onclick="addWater('${d}',500)">+500ml</button><button class="btn blue" onclick="addWater('${d}',1000)">+1L</button><button class="btn secondary" onclick="S.water['${d}']=0;refresh()">Reset</button></div></div>`}

function renderSleep(){document.getElementById('sleep').innerHTML=pageTop('Sleep Tracker','Log sleep and calculate hours, weekly average and monthly average')+`<div class="grid g3">${card('Last Sleep',lastSleepHours(),'Most recent log','blue')}${card('Weekly Average',avgSleep(7)+' hrs','Last 7 days','green')}${card('Monthly Average',avgSleep(31)+' hrs','Last 31 days','gold')}</div><div class="card" style="margin-top:16px"><div class="section-title">Log Sleep</div><div class="form-row three"><div class="field"><label>Date</label><input type="date" id="slDate" value="${today()}"></div><div class="field"><label>Sleep Time</label><input type="time" id="slStart"></div><div class="field"><label>Wake Time</label><input type="time" id="slWake"></div></div><button class="btn" onclick="saveSleep()">Save Sleep</button></div>${sleepTable()}`}
function calcHours(s,w){if(!s||!w)return 0;let a=new Date('2026-01-01T'+s),b=new Date('2026-01-01T'+w);if(b<=a)b.setDate(b.getDate()+1);return Math.round(((b-a)/3600000)*10)/10}
function saveSleep(){const o={id:id(),date:val('slDate'),sleepTime:val('slStart'),wakeTime:val('slWake')};o.hours=calcHours(o.sleepTime,o.wakeTime);if(!o.date||!o.sleepTime||!o.wakeTime){alert('Fill date, sleep time and wake time');return}S.sleep=S.sleep.filter(x=>x.date!==o.date);S.sleep.push(o);refresh();toast('Sleep saved')}
function avgSleep(days){const since=new Date();since.setDate(since.getDate()-days+1);const arr=S.sleep.filter(x=>new Date(x.date+'T12:00:00')>=since);return arr.length?(arr.reduce((s,x)=>s+Number(x.hours||0),0)/arr.length).toFixed(1):'0.0'}
function lastSleepHours(){const a=[...S.sleep].sort((a,b)=>b.date.localeCompare(a.date))[0];return a?a.hours+' hrs':'0 hrs'}
function sleepTable(){return `<div class="card" style="margin-top:16px"><div class="section-title">Sleep History</div><div class="table-wrap"><table><thead><tr><th>Date</th><th>Sleep</th><th>Wake</th><th>Hours</th><th>Action</th></tr></thead><tbody>${[...S.sleep].sort((a,b)=>b.date.localeCompare(a.date)).map(x=>`<tr><td>${x.date}</td><td>${x.sleepTime}</td><td>${x.wakeTime}</td><td>${x.hours}</td><td><button class="btn danger small" onclick="delFrom('sleep',${x.id})">Delete</button></td></tr>`).join('')||'<tr><td colspan="5" class="muted">No sleep logs yet.</td></tr>'}</tbody></table></div></div>`}
function renderMood(){document.getElementById('mood').innerHTML=pageTop('Mood Tracker','Store mood history and view monthly mood chart')+`<div class="card"><div class="section-title">How do you feel today?</div><div class="actions" style="justify-content:flex-start">${moods.map(m=>`<button class="btn secondary" onclick="saveMood('${m.v}')">${m.emoji} ${m.v}</button>`).join('')}</div></div><div class="grid g2" style="margin-top:16px"><div class="card"><div class="section-title">Monthly Chart</div><canvas id="moodChart" class="chart-small"></canvas></div><div class="card"><div class="section-title">Mood History</div><div class="list">${[...S.moods].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20).map(x=>`<div class="item row"><span>${x.date}</span><b>${moodEmoji(x.mood)} ${x.mood}</b><button class="btn danger small" onclick="delFrom('moods',${x.id})">Delete</button></div>`).join('')||'<div class="muted">No mood records yet.</div>'}</div></div></div>`;setTimeout(()=>drawBars('moodChart',moodChartData().labels,moodChartData().values,'#a78bfa'),0)}
function moodEmoji(v){return moods.find(m=>m.v===v)?.emoji||'🙂'}function saveMood(m){S.moods=S.moods.filter(x=>x.date!==today());S.moods.push({id:id(),date:today(),mood:m});refresh();toast('Mood saved')}

function renderJournal(){const q=document.getElementById('journalSearch')?.value||'';const list=S.journal.filter(j=>!q||j.entry.toLowerCase().includes(q.toLowerCase())||j.date.includes(q)).sort((a,b)=>b.date.localeCompare(a.date));document.getElementById('journal').innerHTML=pageTop('Daily Journal','One line journal with searchable history')+`<div class="card"><div class="section-title">${edit.type==='journal'?'Edit Journal Entry':'Add One Line Journal'}</div><div class="form-row"><div class="field"><label>Date</label><input type="date" id="jnDate" value="${edit.type==='journal'?getById(S.journal,edit.id).date:today()}"></div><div class="field"><label>Search Entries</label><input id="journalSearch" value="${esc(q)}" oninput="renderJournal()"></div></div><div class="field"><label>Entry</label><input id="jnEntry" value="${edit.type==='journal'?esc(getById(S.journal,edit.id).entry):''}"></div><button class="btn" style="margin-top:12px" onclick="saveJournal()">${edit.type==='journal'?'Update Entry':'Save Entry'}</button></div><div class="card" style="margin-top:16px"><div class="section-title">Journal History</div><div class="list">${list.map(j=>`<div class="item"><div class="row"><b>${j.date}</b><div class="mini-actions"><button class="btn secondary small" onclick="edit={type:'journal',id:${j.id}};renderJournal()">Edit</button><button class="btn danger small" onclick="delFrom('journal',${j.id})">Delete</button></div></div><p style="margin:8px 0 0;color:var(--muted)">${esc(j.entry)}</p></div>`).join('')||'<div class="muted">No entries found.</div>'}</div></div>`}
function saveJournal(){const o={date:val('jnDate'),entry:val('jnEntry')};if(!o.date||!o.entry){alert('Fill date and entry');return}if(edit.type==='journal'){Object.assign(getById(S.journal,edit.id),o);edit={type:null,id:null}}else S.journal.push({...o,id:id()});refresh();toast('Journal saved')}
function renderLinkedIn(){const mPosts=S.linkedin.posts.filter(p=>p.date.slice(0,7)===ym()).length;const th=isThursday()?`<div class="banner"><div><h3>💼 Thursday LinkedIn Reminder</h3><p>Post today to keep your LinkedIn streak alive.</p></div></div>`:'';document.getElementById('linkedin').innerHTML=pageTop('LinkedIn Growth System','Track weekly posts, streaks, ideas and monthly post count')+th+`<div class="grid g4">${card('Weekly Posts',weekLinkedIn(),'This week','blue')}${card('LinkedIn Streak',linkedInStreak()+' weeks','Weekly streak','gold')}${card('Monthly Post Count',mPosts,'This month','green')}${card('Post Ideas',S.linkedin.ideas.length,'Stored ideas','')}</div><div class="grid g2" style="margin-top:16px"><div class="card"><div class="section-title">Add LinkedIn Post</div><div class="form-row"><div class="field"><label>Date</label><input type="date" id="liDate" value="${today()}"></div><div class="field"><label>Topic / Title</label><input id="liTopic"></div></div><div class="field"><label>Note</label><textarea id="liNote"></textarea></div><button class="btn" style="margin-top:12px" onclick="saveLinkedInPost()">Save Post</button></div><div class="card"><div class="section-title">Post Ideas</div><div class="form-row" style="grid-template-columns:1fr auto"><input id="liIdea"><button class="btn" onclick="addLinkedInIdea()">Add Idea</button></div><div class="list">${S.linkedin.ideas.map((x,i)=>`<div class="item row"><span>${esc(x)}</span><button class="btn danger small" onclick="S.linkedin.ideas.splice(${i},1);refresh()">Delete</button></div>`).join('')}</div></div></div><div class="card" style="margin-top:16px"><div class="section-title">Post History</div><div class="table-wrap"><table><thead><tr><th>Date</th><th>Topic</th><th>Note</th><th>Action</th></tr></thead><tbody>${[...S.linkedin.posts].sort((a,b)=>b.date.localeCompare(a.date)).map(p=>`<tr><td>${p.date}</td><td><b>${esc(p.topic)}</b></td><td>${esc(p.note)}</td><td><button class="btn danger small" onclick="S.linkedin.posts=S.linkedin.posts.filter(x=>x.id!==${p.id});refresh()">Delete</button></td></tr>`).join('')||'<tr><td colspan="4" class="muted">No LinkedIn posts yet.</td></tr>'}</tbody></table></div></div>`}
function weekLinkedIn(){return weekDates().filter(d=>S.linkedin.posts.some(p=>p.date===d)).length}function saveLinkedInPost(){if(!val('liTopic')){alert('Add topic');return}S.linkedin.posts.push({id:id(),date:val('liDate'),topic:val('liTopic'),note:val('liNote')});refresh();toast('LinkedIn post saved')}function addLinkedInIdea(){if(val('liIdea')){S.linkedin.ideas.push(val('liIdea'));refresh();}}
function renderSkills(){document.getElementById('skills').innerHTML=pageTop('Monthly Skill Tracker','Learn something new every month and view yearly roadmap')+`<div class="grid g3">${card('Skills Planned',S.skills.length,'Total roadmap','')}${card('Completed',S.skills.filter(s=>s.status==='Completed'||s.completedDate).length,'Finished skills','green')}${card('In Progress',S.skills.filter(s=>s.status==='In Progress').length,'Active learning','blue')}</div><div class="card" style="margin-top:16px"><div class="section-title">${edit.type==='skill'?'Edit Skill':'Add Skill'}</div><div class="form-row four"><div class="field"><label>Skill Name</label><input id="skName" value="${edit.type==='skill'?esc(getById(S.skills,edit.id).name):''}"></div><div class="field"><label>Started Date</label><input type="date" id="skStart" value="${edit.type==='skill'?getById(S.skills,edit.id).startedDate:''}"></div><div class="field"><label>Completed Date</label><input type="date" id="skEnd" value="${edit.type==='skill'?getById(S.skills,edit.id).completedDate:''}"></div><div class="field"><label>Status</label><select id="skStatus"><option ${sel(edit.type==='skill'&&getById(S.skills,edit.id).status==='Planned')}>Planned</option><option ${sel(edit.type==='skill'&&getById(S.skills,edit.id).status==='In Progress')}>In Progress</option><option ${sel(edit.type==='skill'&&getById(S.skills,edit.id).status==='Completed')}>Completed</option></select></div></div><button class="btn" onclick="saveSkill()">${edit.type==='skill'?'Update':'Add'} Skill</button></div><div class="grid g2" style="margin-top:16px"><div class="card"><div class="section-title">Yearly Learning Roadmap</div><div class="list">${months.map((m,i)=>{const skill=S.skills.find(s=>s.startedDate&&Number(s.startedDate.slice(5,7))===i+1);return `<div class="item row"><span class="pill gold">${m}</span><b>${skill?esc(skill.name):'Open slot'}</b><span class="muted">${skill?skill.status:''}</span></div>`}).join('')}</div></div><div class="card"><div class="section-title">Skill List</div><div class="list">${S.skills.map(s=>`<div class="item row"><div><b>${esc(s.name)}</b><div class="muted">${s.startedDate||'No start'} → ${s.completedDate||'Not completed'}</div></div><span class="pill ${s.status==='Completed'?'green':s.status==='In Progress'?'blue':'gold'}">${s.status}</span><div class="mini-actions"><button class="btn secondary small" onclick="edit={type:'skill',id:${s.id}};renderSkills()">Edit</button><button class="btn danger small" onclick="delFrom('skills',${s.id})">Delete</button></div></div>`).join('')}</div></div></div>`}
function saveSkill(){const o={name:val('skName'),startedDate:val('skStart'),completedDate:val('skEnd'),status:val('skStatus')};if(!o.name){alert('Add skill name');return}if(edit.type==='skill'){Object.assign(getById(S.skills,edit.id),o);edit={type:null,id:null}}else S.skills.push({...o,id:id()});refresh();toast('Skill saved')}
function renderCourses(){document.getElementById('courses').innerHTML=pageTop('Course Tracker','Track courses by provider, progress and status')+`<div class="card"><div class="section-title">${edit.type==='course'?'Edit Course':'Add Course'}</div><div class="form-row four"><div class="field"><label>Course Name</label><input id="coName" value="${edit.type==='course'?esc(getById(S.courses,edit.id).name):''}"></div><div class="field"><label>Provider</label><input id="coProvider" value="${edit.type==='course'?esc(getById(S.courses,edit.id).provider):''}"></div><div class="field"><label>Progress %</label><input type="number" id="coProgress" min="0" max="100" value="${edit.type==='course'?getById(S.courses,edit.id).progress||0:0}"></div><div class="field"><label>Status</label><select id="coStatus"><option>Planned</option><option>In Progress</option><option>Completed</option></select></div></div><button class="btn" onclick="saveCourse()">${edit.type==='course'?'Update':'Add'} Course</button></div><div class="grid g3" style="margin-top:16px">${S.courses.map(c=>`<div class="card"><div class="row"><h3 style="margin:0">${esc(c.name)}</h3><span class="pill blue">${esc(c.status)}</span></div><p class="muted">${esc(c.provider)}</p><div class="bar"><div class="fill" style="width:${Number(c.progress||0)}%"></div></div><div class="row" style="margin-top:10px"><b>${c.progress}%</b><div class="mini-actions"><button class="btn secondary small" onclick="edit={type:'course',id:${c.id}};renderCourses()">Edit</button><button class="btn danger small" onclick="delFrom('courses',${c.id})">Delete</button></div></div></div>`).join('')||'<div class="card muted">No courses yet.</div>'}</div>`;if(edit.type==='course'){document.getElementById('coStatus').value=getById(S.courses,edit.id).status||'Planned'}}
function saveCourse(){const o={name:val('coName'),provider:val('coProvider'),progress:Number(val('coProgress')),status:val('coStatus')};if(!o.name){alert('Add course name');return}if(edit.type==='course'){Object.assign(getById(S.courses,edit.id),o);edit={type:null,id:null}}else S.courses.push({...o,id:id()});refresh();toast('Course saved')}
function renderGoals(){document.getElementById('goals').innerHTML=pageTop('Goals System','Career, finance, travel, health and personal goals')+`<div class="card"><div class="section-title">${edit.type==='goal'?'Edit Goal':'Add Goal'}</div><div class="form-row four"><div class="field"><label>Category</label><select id="goCat">${goalCategories.map(c=>`<option ${sel(edit.type==='goal'&&getById(S.goals,edit.id).category===c)}>${c}</option>`).join('')}</select></div><div class="field"><label>Target</label><input id="goTarget" value="${edit.type==='goal'?esc(getById(S.goals,edit.id).target):''}"></div><div class="field"><label>Deadline</label><input type="date" id="goDeadline" value="${edit.type==='goal'?getById(S.goals,edit.id).deadline:''}"></div><div class="field"><label>Progress %</label><input type="number" id="goProgress" min="0" max="100" value="${edit.type==='goal'?getById(S.goals,edit.id).progress||0:0}"></div></div><button class="btn" onclick="saveGoal()">${edit.type==='goal'?'Update':'Add'} Goal</button></div><div class="grid g3" style="margin-top:16px">${S.goals.map(g=>`<div class="card"><div class="row"><span class="pill gold">${g.category}</span><span class="muted">${g.deadline}</span></div><h3>${esc(g.target)}</h3><div class="bar"><div class="fill" style="width:${g.progress}%"></div></div><div class="row" style="margin-top:10px"><b>${g.progress}%</b><div class="mini-actions"><button class="btn secondary small" onclick="edit={type:'goal',id:${g.id}};renderGoals()">Edit</button><button class="btn danger small" onclick="delFrom('goals',${g.id})">Delete</button></div></div></div>`).join('')||'<div class="card muted">No goals yet.</div>'}</div>`}

function renderHabits(){const dates=weekDates();const score=habitScore(dates);document.getElementById('habits').innerHTML=pageTop('Habit Tracker','Weekly habits with tick system and completion score')+`<div class="grid g3">${card('Weekly Score',score+'%','Completion this week','green')}${card('Habits',S.habits.names.length,'Tracked habits','')}${card('Completed Ticks',completedHabitTicks(dates),'This week','gold')}</div><div class="card" style="margin-top:16px"><div class="section-title">Add Habit</div><div class="form-row" style="grid-template-columns:1fr auto"><input id="habitName"><button class="btn" onclick="addHabit()">Add Habit</button></div></div><div class="card" style="margin-top:16px"><div class="section-title">Weekly Tick Board</div><div class="week-grid"><div></div>${dates.map(d=>`<div class="week-cell">${new Date(d+'T12:00:00').toLocaleString('en',{weekday:'short'})}<br><span class="muted">${d.slice(8)}</span></div>`).join('')}${S.habits.names.map(h=>`<div class="week-cell" style="justify-content:space-between;padding:0 10px">${esc(h)} <button class="btn danger small" onclick="removeHabit('${encodeURIComponent(h)}')">×</button></div>${dates.map(d=>`<div class="week-cell check ${S.habits.marks[habitKey(h,d)]?'done':''}" onclick="toggleHabit('${encodeURIComponent(h)}','${d}')">${S.habits.marks[habitKey(h,d)]?'✓':''}</div>`).join('')}`).join('')}</div></div>`}
function weekDates(){const now=new Date();const start=new Date(now);start.setDate(now.getDate()-now.getDay()+1);return Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d.toISOString().slice(0,10)})}
function habitKey(h,d){return h+'|'+d}function toggleHabit(h,d){h=decodeURIComponent(h);const k=habitKey(h,d);S.habits.marks[k]=!S.habits.marks[k];if(!S.habits.marks[k])delete S.habits.marks[k];refresh()}function addHabit(){if(val('habitName')){S.habits.names.push(val('habitName'));refresh()}}function removeHabit(h){h=decodeURIComponent(h);S.habits.names=S.habits.names.filter(x=>x!==h);Object.keys(S.habits.marks).forEach(k=>{if(k.startsWith(h+'|'))delete S.habits.marks[k]});refresh()}function completedHabitTicks(dates){let c=0;S.habits.names.forEach(h=>dates.forEach(d=>{if(S.habits.marks[habitKey(h,d)])c++}));return c}function habitScore(dates){return pct(completedHabitTicks(dates),S.habits.names.length*dates.length)}
function renderReview(){const m=document.getElementById('reviewMonth')?.value||ym();const cur=S.reviews.find(r=>r.month===m)||{};document.getElementById('review').innerHTML=pageTop('Monthly Review','Rate Health, Career, Finance, Learning and Relationships from 1 to 5')+`<div class="grid g2"><div class="card"><div class="section-title">Review Month</div><input type="month" id="reviewMonth" value="${m}" onchange="renderReview()"><div id="reviewStars" style="margin-top:16px">${['Health','Career','Finance','Learning','Relationships'].map(k=>starRow(k,cur[k.toLowerCase()]||0)).join('')}</div><div class="field" style="margin-top:12px"><label>Notes</label><textarea id="reviewNotes">${esc(cur.notes||'')}</textarea></div><button class="btn" style="margin-top:12px" onclick="saveReview('${m}')">Save Monthly Review</button></div><div class="card"><div class="section-title">Monthly Trend</div><canvas id="reviewChart" class="chart-small"></canvas></div></div><div class="card" style="margin-top:16px"><div class="section-title">Review History</div><div class="list">${S.reviews.sort((a,b)=>b.month.localeCompare(a.month)).map(r=>`<div class="item row"><b>${monthName(r.month)}</b><span>Health ${r.health} • Career ${r.career} • Finance ${r.finance} • Learning ${r.learning} • Relationships ${r.relationships}</span><button class="btn danger small" onclick="S.reviews=S.reviews.filter(x=>x.month!=='${r.month}');refresh()">Delete</button></div>`).join('')||'<div class="muted">No reviews yet.</div>'}</div></div>`;setTimeout(()=>drawBars('reviewChart',S.reviews.map(r=>r.month),S.reviews.map(r=>((r.health+r.career+r.finance+r.learning+r.relationships)/5).toFixed(1)),'#d4af37'),0)}
function starRow(k,v){return `<div class="row item"><b>${k}</b><div class="stars" data-key="${k.toLowerCase()}">${[1,2,3,4,5].map(n=>`<span class="star ${n<=v?'on':''}" onclick="setStars('${k.toLowerCase()}',${n})">★</span>`).join('')}</div><input type="hidden" id="rate_${k.toLowerCase()}" value="${v}"></div>`}

function renderReminders(){document.getElementById('reminders').innerHTML=pageTop('Reminders System','Recurring and custom reminders that appear on Home when due')+`<div class="card"><div class="section-title">${edit.type==='reminder'?'Edit Reminder':'Add Custom Reminder'}</div><div class="form-row four"><div class="field"><label>Title</label><input id="rmTitle" value="${edit.type==='reminder'?esc(getById(S.reminders,edit.id).title):''}"></div><div class="field"><label>Type</label><select id="rmType" onchange="renderReminderTypeFields()"><option value="once">One Time</option><option value="weekly">Weekly</option><option value="monthly-day">Monthly Day</option><option value="last-day">Last Day of Month</option></select></div><div class="field"><label>Date / Day</label><input id="rmDate" value="${edit.type==='reminder'?(getById(S.reminders,edit.id).date||getById(S.reminders,edit.id).day||''):''}"></div><div class="field"><label>Enabled</label><select id="rmEnabled"><option value="true">Enabled</option><option value="false">Disabled</option></select></div></div><button class="btn" onclick="saveReminder()">${edit.type==='reminder'?'Update':'Add'} Reminder</button></div><div class="card" style="margin-top:16px"><div class="section-title">Reminder List</div><div class="list">${S.reminders.map(r=>`<div class="item row"><div><b>${esc(r.title)}</b><div class="muted">${reminderText(r)}</div></div><span class="pill ${r.enabled?'green':'pink'}">${r.enabled?'Enabled':'Disabled'}</span><div class="mini-actions"><button class="btn secondary small" onclick="edit={type:'reminder',id:${r.id}};renderReminders();document.getElementById('rmType').value='${r.type}';document.getElementById('rmEnabled').value='${r.enabled}'">Edit</button><button class="btn danger small" onclick="delFrom('reminders',${r.id})">Delete</button></div></div>`).join('')}</div></div>`;if(edit.type==='reminder'){document.getElementById('rmType').value=getById(S.reminders,edit.id).type;document.getElementById('rmEnabled').value=String(getById(S.reminders,edit.id).enabled)}}
function reminderText(r){if(r.type==='weekly')return 'Every '+['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][r.day];if(r.type==='monthly-day')return 'Every month on day '+r.day;if(r.type==='last-day')return 'Last day of every month';if(r.type==='once')return 'One time: '+r.date;return r.type}function saveReminder(){const type=val('rmType');const raw=val('rmDate');const o={title:val('rmTitle'),type,enabled:val('rmEnabled')==='true'};if(type==='once')o.date=raw;if(type==='weekly')o.day=Number(raw);if(type==='monthly-day')o.day=Number(raw);if(!o.title){alert('Add reminder title');return}if((type==='once'||type==='weekly'||type==='monthly-day')&&!raw){alert('Add date/day value');return}if(edit.type==='reminder'){Object.assign(getById(S.reminders,edit.id),o);edit={type:null,id:null}}else S.reminders.push({...o,id:id()});refresh();toast('Reminder saved')}
function renderAnalytics(){document.getElementById('analytics').innerHTML=pageTop('Analytics Page','Charts for savings, expenses, travel, learning, habits and LinkedIn')+`<div class="grid g2"><div class="card"><div class="section-title">Savings by Month</div><canvas id="anSavings"></canvas></div><div class="card"><div class="section-title">Expenses This Month</div><canvas id="anExpenses"></canvas></div><div class="card"><div class="section-title">Travel Progress</div><canvas id="anTravel"></canvas></div><div class="card"><div class="section-title">Learning Progress</div><canvas id="anLearning"></canvas></div><div class="card"><div class="section-title">Habits This Week</div><canvas id="anHabits"></canvas></div><div class="card"><div class="section-title">LinkedIn Monthly Posts</div><canvas id="anLinkedIn"></canvas></div></div>`;setTimeout(()=>{drawBars('anSavings',months,months.map((m,i)=>['gold','emergency','travel'].reduce((s,c)=>s+budgetSavedMonth(c,`${new Date().getFullYear()}-${String(i+1).padStart(2,'0')}`),0)),'#4ade80');drawPie('anExpenses',expensePieData());drawBars('anTravel',S.travelGoals.map(g=>g.trip),S.travelGoals.map(g=>pct(g.saved,g.target)),'#60a5fa');drawBars('anLearning',['Planned','In Progress','Completed'],['Planned','In Progress','Completed'].map(st=>S.skills.filter(s=>s.status===st).length),'#a78bfa');drawBars('anHabits',weekDates().map(d=>d.slice(5)),weekDates().map(d=>S.habits.names.filter(h=>S.habits.marks[habitKey(h,d)]).length),'#d4af37');drawBars('anLinkedIn',months,months.map((m,i)=>S.linkedin.posts.filter(p=>p.date.startsWith(`${new Date().getFullYear()}-${String(i+1).padStart(2,'0')}`)).length),'#fb923c')},0)}
function renderSettings(){document.getElementById('settings').innerHTML=pageTop('Settings','Export, import, backup and reset your Life OS data')+`<div class="grid g2"><div class="card"><div class="section-title">Data Management</div><div class="list"><div class="item row"><div><b>Export Data</b><div class="muted">Download all localStorage data as JSON.</div></div><button class="btn" onclick="exportData()">Export</button></div><div class="item row"><div><b>Import Data</b><div class="muted">Restore from a JSON backup.</div></div><button class="btn secondary" onclick="document.getElementById('importFile').click()">Import</button><input id="importFile" type="file" accept="application/json" style="display:none" onchange="importData(event)"></div><div class="item row danger-zone"><div><b>Reset AURA</b><div class="muted">Clear all data and restore defaults.</div></div><button class="btn danger" onclick="resetData()">Reset</button></div></div></div><div class="card"><div class="section-title">Storage</div><p class="muted">AURA stores everything in your browser using localStorage. No server, no database and no framework is required.</p><div class="item row"><span>Storage Key</span><b>${KEY}</b></div><div class="item row"><span>Modules</span><b>20</b></div></div></div>`}
function val(id){return document.getElementById(id)?.value?.trim()||''}
function delFrom(arr,idv){if(confirm('Delete this record?')){S[arr]=S[arr].filter(x=>x.id!=idv);edit={type:null,id:null};refresh();toast('Deleted')}}
function saveExpenseSafe(){saveExpense()}
function closeModal(){document.getElementById('modalBg').style.display='none'}
function openModal(title,body){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modalBg').style.display='flex'}
function drawPie(id,data){const cv=document.getElementById(id);if(!cv)return;const rect=cv.getBoundingClientRect();cv.width=rect.width*devicePixelRatio;cv.height=rect.height*devicePixelRatio;const ctx=cv.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);const w=rect.width,h=rect.height;ctx.clearRect(0,0,w,h);const vals=data.filter(d=>Number(d[1])>0);const total=vals.reduce((s,d)=>s+Number(d[1]),0);if(!total){ctx.fillStyle='#aaa5a0';ctx.font='14px Inter, sans-serif';ctx.fillText('No data yet',24,40);return}let start=-Math.PI/2;const r=Math.min(w,h)*.30,cx=w*.32,cy=h*.52;vals.forEach(d=>{const ang=Number(d[1])/total*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+ang);ctx.closePath();ctx.fillStyle=d[2];ctx.fill();start+=ang});let y=34;ctx.font='12px Inter, sans-serif';vals.forEach(d=>{ctx.fillStyle=d[2];ctx.fillRect(w*.62,y-10,10,10);ctx.fillStyle='#f6f2ea';ctx.fillText(`${d[0]}: ${fmt(d[1])}`,w*.62+18,y);y+=24})}
function drawBars(id,labels,values,color='#d4af37'){const cv=document.getElementById(id);if(!cv)return;const rect=cv.getBoundingClientRect();cv.width=rect.width*devicePixelRatio;cv.height=rect.height*devicePixelRatio;const ctx=cv.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);const w=rect.width,h=rect.height;ctx.clearRect(0,0,w,h);const vals=values.map(Number);const max=Math.max(1,...vals);const pad=34;const bw=(w-pad*2)/Math.max(vals.length,1)*.62;ctx.font='11px Inter, sans-serif';ctx.fillStyle='#aaa5a0';if(!vals.length){ctx.fillText('No data yet',24,40);return}vals.forEach((v,i)=>{const x=pad+i*((w-pad*2)/vals.length)+((w-pad*2)/vals.length-bw)/2;const bh=(h-pad*2)*(v/max);ctx.fillStyle=color;ctx.fillRect(x,h-pad-bh,bw,bh);ctx.fillStyle='#aaa5a0';ctx.save();ctx.translate(x+bw/2,h-12);ctx.rotate(-.55);ctx.textAlign='right';ctx.fillText(String(labels[i]).slice(0,12),0,0);ctx.restore();ctx.fillStyle='#f6f2ea';ctx.textAlign='center';ctx.fillText(String(v),x+bw/2,h-pad-bh-6)});ctx.textAlign='left'}
function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='aura-life-os-backup.json';a.click();URL.revokeObjectURL(a.href)}
function importData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{S=merge(defaultState,JSON.parse(reader.result));save();renderPage(active);toast('Imported successfully')}catch(err){alert('Invalid JSON file')}};reader.readAsText(file)}
function resetData(){if(confirm('Reset all AURA data? This cannot be undone.')){S=clone(defaultState);save();renderPage(active);toast('AURA reset')}}

function renderReminderTypeFields(){const t=val('rmType');const f=document.getElementById('rmDate');if(!f)return;f.disabled=false;f.removeAttribute('min');f.removeAttribute('max');if(t==='once'){f.type='date';f.placeholder='Select date'}else if(t==='weekly'){f.type='number';f.min='0';f.max='6';f.placeholder='0=Sunday, 4=Thursday'}else if(t==='monthly-day'){f.type='number';f.min='1';f.max='31';f.placeholder='1 to 31'}else{f.type='text';f.value='';f.placeholder='Automatic last day';f.disabled=true}}
function init(){renderNav();renderPage('home');tick();}
init();
</script>
